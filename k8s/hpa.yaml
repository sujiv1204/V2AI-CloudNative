apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: v2ai-backend-hpa
  namespace: v2ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: v2ai-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: v2ai-ml-pipeline-hpa
  namespace: v2ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: v2ai-ml-pipeline
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
