apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: v2ai-backend-hpa
  namespace: v2ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: v2ai-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
