apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2ai-ml-pipeline
  namespace: v2ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: v2ai-ml-pipeline
  template:
    metadata:
      labels:
        app: v2ai-ml-pipeline
    spec:
      containers:
      - name: ml-pipeline
        image: gcr.io/v2aicloud/v2ai-ml-pipeline:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
            ephemeral-storage: "4Gi"
          limits:
            memory: "8Gi"
            cpu: "2000m"
            ephemeral-storage: "8Gi"
        envFrom:
        - configMapRef:
            name: v2ai-config
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/gcp-key.json"
        volumeMounts:
        - name: gcp-creds
          mountPath: /secrets
          readOnly: true
        - name: model-cache
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
      volumes:
      - name: gcp-creds
        secret:
          secretName: gcp-credentials
      - name: model-cache
        emptyDir: {}
