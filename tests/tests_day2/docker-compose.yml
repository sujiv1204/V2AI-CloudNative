version: '3.8'

services:
  qa-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: qa-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - qa-network

  redis:
    image: redis:alpine
    container_name: qa-cache
    ports:
      - "6379:6379"
    networks:
      - qa-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: qa-viewer
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - qa-network

networks:
  qa-network:
    driver: bridge
